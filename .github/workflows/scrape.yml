name: Scrape events

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:        # manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          curl -s -f -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron/scrape"
